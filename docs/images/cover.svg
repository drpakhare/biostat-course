  <text x="640" y="710" font-family="Georgia, serif" font-size="11" fill="#78909c" font-style="italic" opacity="0.25">p &lt; 0.05</text>

  <!-- Small formula hint -->
  <text x="160" y="710" font-family="Georgia, serif" font-size="10" fill="#78909c" font-style="italic" opacity="0.18">z = (x̄ − μ) / (σ/√n)</text>

