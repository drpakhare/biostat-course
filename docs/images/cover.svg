  <!-- ============================================ -->

  <!-- Mean labels at peaks -->
  <text x="318" y="542" font-family="Georgia, serif" font-size="13" fill="#1a237e" text-anchor="middle" font-style="italic" opacity="0.35">μ₁</text>
  <text x="405" y="540" font-family="Georgia, serif" font-size="13" fill="#00695c" text-anchor="middle" font-style="italic" opacity="0.35">μ₂</text>
  <text x="495" y="582" font-family="Georgia, serif" font-size="13" fill="#c62828" text-anchor="middle" font-style="italic" opacity="0.35">μ₃</text>

  <!-- Dashed mean lines from peaks -->
  <line x1="318" y1="555" x2="318" y2="720" stroke="#1a237e" stroke-width="0.7" stroke-dasharray="3,4" opacity="0.12" />
  <line x1="405" y1="555" x2="405" y2="720" stroke="#00695c" stroke-width="0.7" stroke-dasharray="3,4" opacity="0.12" />
  <line x1="495" y1="595" x2="495" y2="720" stroke="#c62828" stroke-width="0.7" stroke-dasharray="3,4" opacity="0.12" />

  <!-- 95% CI bracket below scatter dots -->
