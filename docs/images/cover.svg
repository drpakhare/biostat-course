  <line x1="250" y1="793" x2="250" y2="803" stroke="#c62828" stroke-width="1.2" opacity="0.3" />
  <line x1="560" y1="793" x2="560" y2="803" stroke="#c62828" stroke-width="1.2" opacity="0.3" />
  <text x="405" y="815" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#c62828" text-anchor="middle" opacity="0.35" letter-spacing="0.5">95% CI</text>

